{% extends 'base.html' %}
{% block title %}{{ form_title }}{% endblock %}
{% block content %}
<section class="card form-card">
  <div class="title-row">
    <div>
      <h2>{{ form_title }}</h2>
      <p class="muted">Edycja słownika typów źródeł wykorzystywanego w formularzu źródła.</p>
    </div>
  </div>
  <form method="post" class="form-grid">
    <div class="field full">
      <label for="name">Nazwa</label>
      <input id="name" type="text" name="name" value="{{ form_data.name }}" required>
    </div>
    <div class="form-actions full">
      <button type="submit">{{ submit_label }}</button>
      <a class="button ghost" href="{{ url_for('parameters_list') }}">Anuluj</a>
    </div>
  </form>
</section>
{% endblock %}
